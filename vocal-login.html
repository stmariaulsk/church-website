<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Вокал</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: linear-gradient(135deg, #1a2c42 0%, #2c4a6b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .auth-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
        }
        
        .auth-header {
            background: #c5a059;
            color: white;
            padding: 2rem;
            text-align: center;
        }
        .auth-header i { font-size: 3rem; margin-bottom: 1rem; }
        .auth-header h1 { font-size: 1.5rem; }
        .auth-header p { opacity: 0.9; margin-top: 0.5rem; }
        
        .auth-body { padding: 2rem; }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { 
            display: block; 
            margin-bottom: 0.5rem; 
            font-weight: 600; 
            color: #1a2c42;
        }
        .form-group input, .form-group select { 
            width: 100%; 
            padding: 0.9rem; 
            border: 2px solid #f4f1ea; 
            border-radius: 6px; 
            font-size: 1rem;
            font-family: inherit;
            transition: 0.3s;
        }
        .form-group input:focus, .form-group select:focus { 
            outline: none; 
            border-color: #c5a059;
            box-shadow: 0 0 0 3px rgba(197, 160, 89, 0.2);
        }
        
        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-primary { background: #1a2c42; color: white; }
        .btn-primary:hover { background: #2c4a6b; }
        .btn-accent { background: #c5a059; color: white; }
        .btn-accent:hover { background: #d4b06a; }
        
        .auth-switch {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #f4f1ea;
        }
        .auth-switch a { color: #c5a059; text-decoration: none; font-weight: 600; }
        .auth-switch a:hover { text-decoration: underline; }
        
        .form-tabs { display: flex; margin-bottom: 1.5rem; border-bottom: 2px solid #f4f1ea; }
        .form-tab {
            flex: 1;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            transition: 0.3s;
        }
        .form-tab.active {
            color: #1a2c42;
            border-bottom: 2px solid #c5a059;
            margin-bottom: -2px;
        }
        
        .form-section { display: none; }
        .form-section.active { display: block; }
        
        .alert {
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: none;
        }
        .alert-error { background: #f8d7da; color: #721c24; }
        .alert-success { background: #d4edda; color: #155724; }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <i class="fas fa-microphone-alt"></i>
            <h1>Вокальная студия</h1>
            <p>Церковь Святой Марии</p>
        </div>
        
        <div class="auth-body">
            <div class="alert alert-error" id="alert-error"></div>
            <div class="alert alert-success" id="alert-success"></div>
            
            <div class="form-tabs">
                <div class="form-tab active" onclick="switchTab('login')">Вход</div>
                <div class="form-tab" onclick="switchTab('register')">Регистрация</div>
            </div>
            
            <!-- Login Form -->
            <div class="form-section active" id="login-form">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="login-email" required placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Пароль</label>
                        <input type="password" id="login-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary" id="login-btn">
                        <i class="fas fa-sign-in-alt"></i> Войти
                    </button>
                </form>
            </div>
            
            <!-- Register Form -->
            <div class="form-section" id="register-form">
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> ФИО</label>
                        <input type="text" id="reg-name" required placeholder="Иванов Иван Иванович">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="reg-email" required placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-phone"></i> Телефон</label>
                        <input type="tel" id="reg-phone" required placeholder="+7 (999) 000-00-00">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-user-tag"></i> Тип аккаунта</label>
                        <select id="reg-type" required>
                            <option value="student">Студент (хочу записаться)</option>
                            <option value="teacher">Преподаватель (хочу вести занятия)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Пароль</label>
                        <input type="password" id="reg-password" required placeholder="••••••••" minlength="6">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Подтверждение пароля</label>
                        <input type="password" id="reg-password-confirm" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-accent" id="register-btn">
                        <i class="fas fa-user-plus"></i> Зарегистрироваться
                    </button>
                </form>
            </div>
            
            <div class="auth-switch">
                <p><a href="index.html">← Вернуться на сайт церкви</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        // Import Firebase
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        // Firebase config - ЗАМЕНИТЕ НА СВОИ ДАННЫЕ
        const firebaseConfig = {
            apiKey: "AIzaSyC0YQBEy7yAQ14Ion-Vx3w99KNtG9kSHQw",
            authDomain: "stmariaulsk-vocaldb.firebaseapp.com",
            projectId: "stmariaulsk-vocaldb",
            storageBucket: "stmariaulsk-vocaldb.firebasestorage.app",
            messagingSenderId: "1014321374210",
            appId: "1:1014321374210:web:f228e994505553c741b31b"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Make functions global
        window.switchTab = function(tab) {
            document.querySelectorAll('.form-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelector('.form-tab:nth-child(1)').classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelector('.form-tab:nth-child(2)').classList.add('active');
                document.getElementById('register-form').classList.add('active');
            }
            
            hideAlerts();
        };

        window.handleLogin = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Вход...';
            
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // Get user data from Firestore
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    localStorage.setItem('user', JSON.stringify({
                        uid: user.uid,
                        email: user.email,
                        name: userData.name,
                        type: userData.type,
                        phone: userData.phone
                    }));
                    
                    showAlert('Успешный вход! Перенаправление...', 'success');
                    setTimeout(() => {
                        window.location.href = userData.type === 'teacher' ? 'vocal-teacher.html' : 'vocal-student.html';
                    }, 1500);
                } else {
                    throw new Error('Профиль не найден');
                }
            } catch (error) {
                showAlert('Ошибка: ' + error.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Войти';
            }
        };

        window.handleRegister = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('register-btn');
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const phone = document.getElementById('reg-phone').value;
            const type = document.getElementById('reg-type').value;
            const password = document.getElementById('reg-password').value;
            const passwordConfirm = document.getElementById('reg-password-confirm').value;
            
            if (password !== passwordConfirm) {
                showAlert('Пароли не совпадают', 'error');
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Регистрация...';
            
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // Save user data to Firestore
                await setDoc(doc(db, 'users', user.uid), {
                    name,
                    email,
                    phone,
                    type,
                    createdAt: new Date().toISOString(),
                    status: 'active'
                });
                
                // If teacher, create availability document
                if (type === 'teacher') {
                    await setDoc(doc(db, 'teachers', user.uid), {
                        name,
                        email,
                        phone,
                        availability: {},
                        status: 'active'
                    });
                }
                
                localStorage.setItem('user', JSON.stringify({
                    uid: user.uid,
                    email: user.email,
                    name,
                    type,
                    phone
                }));
                
                showAlert('Регистрация успешна! Перенаправление...', 'success');
                setTimeout(() => {
                    window.location.href = type === 'teacher' ? 'vocal-teacher.html' : 'vocal-student.html';
                }, 1500);
            } catch (error) {
                showAlert('Ошибка: ' + error.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Зарегистрироваться';
            }
        };

        function showAlert(message, type) {
            const errorAlert = document.getElementById('alert-error');
            const successAlert = document.getElementById('alert-success');
            
            errorAlert.style.display = 'none';
            successAlert.style.display = 'none';
            
            if (type === 'error') {
                errorAlert.textContent = message;
                errorAlert.style.display = 'block';
            } else {
                successAlert.textContent = message;
                successAlert.style.display = 'block';
            }
        }

        function hideAlerts() {
            document.getElementById('alert-error').style.display = 'none';
            document.getElementById('alert-success').style.display = 'none';
        }

        // Check if already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                const savedUser = JSON.parse(localStorage.getItem('user'));
                if (savedUser) {
                    window.location.href = savedUser.type === 'teacher' ? 'vocal-teacher.html' : 'vocal-student.html';
                }
            }
        });
    </script>
</body>
</html>
